<!DOCTYPE html>
<html>

<head>

<title>Evidence Verification Result</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
min-height:100vh;
display:flex;
flex-direction:column;
}

.box{
background:#111;
padding:40px;
border-radius:12px;
text-align:center;
box-shadow:0 0 25px cyan;
width:500px;
}

.hash{
word-break:break-all;
color:#00ffff;
margin-top:15px;
}

.result{
font-size:22px;
margin-top:20px;
}

a{
display:inline-block;
margin-top:25px;
padding:10px 20px;
background:cyan;
color:black;
text-decoration:none;
border-radius:6px;
}

</style>

</head>

<body>

<div style="flex:1; display:flex; justify-content:center; align-items:center;">
<div class="box">

<h2>Evidence Verification Result</h2>

<div class="result">{{ result }}</div>

<p>Generated SHA256 Hash:</p>

<div class="hash">{{ generated_hash }}</div>

<a href="/dashboard">Back to Dashboard</a>

</div>
</div>

<footer style="text-align:center; padding:20px 15px; color:#888; font-size:12px; border-top:1px solid rgba(0,255,255,0.2); background:rgba(0,0,0,0.5); letter-spacing:0.5px; width:100%;">
    <p style="margin:4px 0;">&copy; 2026 Cyber Crime Investigation System. All rights reserved.</p>
    <p style="margin:4px 0; color:#00ffff; font-size:13px;">Developed by Gungun I &amp; Ayushi I.</p>
</footer>

</body>

</html>
