<!DOCTYPE html>
<html>

<head>

<title>Evidence Verification Result</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#111;
padding:40px;
border-radius:12px;
text-align:center;
box-shadow:0 0 25px cyan;
width:500px;
}

.hash{
word-break:break-all;
color:#00ffff;
margin-top:15px;
}

.result{
font-size:22px;
margin-top:20px;
}

a{
display:inline-block;
margin-top:25px;
padding:10px 20px;
background:cyan;
color:black;
text-decoration:none;
border-radius:6px;
}

</style>

</head>

<body>

<div class="box">

<h2>Evidence Verification Result</h2>

<div class="result">{{ result }}</div>

<p>Generated SHA256 Hash:</p>

<div class="hash">{{ generated_hash }}</div>

<a href="/dashboard">Back to Dashboard</a>

</div>

</body>

</html>
