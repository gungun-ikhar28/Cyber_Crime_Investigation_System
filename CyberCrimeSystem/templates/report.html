<!DOCTYPE html>
<html>

<head>
<title>Generate Report</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
.report-container {
    max-width: 650px;
    margin: 40px auto;
    padding: 30px;
}

.report-form {
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid #00ffff;
    border-radius: 12px;
    padding: 30px;
}

.report-form label {
    display: block;
    color: #00ffff;
    margin-top: 15px;
    margin-bottom: 5px;
    font-size: 14px;
}

.report-form input[type="text"],
.report-form textarea {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid #00ffff;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    box-sizing: border-box;
}

.report-form textarea {
    height: 120px;
    resize: vertical;
}

.report-form input::placeholder,
.report-form textarea::placeholder {
    color: #aaa;
}

.report-form button {
    margin-top: 25px;
    padding: 14px 30px;
    border: 2px solid #00ffff;
    background: transparent;
    color: #00ffff;
    font-size: 16px;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
    width: 100%;
}

.report-form button:hover {
    background: #00ffff;
    color: black;
    box-shadow: 0 0 20px #00ffff;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">Cyber Crime Investigation System</div>
<div class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/">Home</a>
</div>
</div>

<div class="report-container">

<h1 style="text-align:center; color:#00ffff; text-shadow:0 0 15px #00ffff; margin-bottom:30px;">
    Generate Chain of Custody Report
</h1>

<form method="POST" class="report-form">

    <label>Case Number</label>
    <input type="text" name="case_number" placeholder="e.g. CC-2026-001" required>

    <label>Lead Investigator</label>
    <input type="text" name="investigator" placeholder="Full Name" required>

    <label>Department</label>
    <input type="text" name="department" placeholder="e.g. Cyber Crime Cell, Mumbai">

    <label>Case Description</label>
    <textarea name="description" placeholder="Brief description of the cyber crime case..."></textarea>

    <button type="submit">Generate Report</button>

</form>

</div>

</body>
</html>
