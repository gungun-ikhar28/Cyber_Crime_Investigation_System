<!DOCTYPE html>
<html>

<head>
<title>Investigator Chat</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
.chat-container {
    max-width: 800px;
    margin: 30px auto;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 120px);
}

.chat-header {
    text-align: center;
    color: #00ffff;
    text-shadow: 0 0 15px #00ffff;
    margin-bottom: 15px;
}

.chat-box {
    flex: 1;
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid #00ffff;
    border-radius: 12px;
    padding: 20px;
    overflow-y: auto;
    margin-bottom: 15px;
}

.chat-msg {
    margin-bottom: 12px;
    padding: 10px 15px;
    border-radius: 8px;
    background: rgba(0, 255, 255, 0.05);
    border-left: 3px solid #00ffff;
}

.chat-msg .msg-user {
    color: #00ffff;
    font-weight: bold;
    font-size: 13px;
}

.chat-msg .msg-time {
    color: #666;
    font-size: 11px;
    margin-left: 10px;
}

.chat-msg .msg-text {
    margin-top: 5px;
    color: white;
    font-size: 14px;
    word-wrap: break-word;
}

.chat-input-area {
    display: flex;
    gap: 10px;
}

.chat-input-area input[type="text"] {
    flex: 1;
    padding: 12px 20px;
    background: transparent;
    border: 2px solid #00ffff;
    border-radius: 25px;
    color: white;
    font-size: 14px;
}

.chat-input-area input::placeholder { color: #aaa; }

.chat-input-area button {
    padding: 12px 25px;
    border: 2px solid #00ffff;
    background: transparent;
    color: #00ffff;
    border-radius: 25px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.3s;
}

.chat-input-area button:hover {
    background: #00ffff;
    color: black;
    box-shadow: 0 0 15px #00ffff;
}

.username-bar {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
    gap: 10px;
    align-items: center;
}

.username-bar label {
    color: #00ffff;
    font-size: 14px;
}

.username-bar input {
    width: 200px;
    padding: 8px 15px;
    background: transparent;
    border: 1px solid #00ffff;
    border-radius: 20px;
    color: white;
    font-size: 13px;
    text-align: center;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">Cyber Crime Investigation System</div>
<div class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/">Home</a>
</div>
</div>

<div class="chat-container">

<h1 class="chat-header">Investigator Chat System</h1>

<div class="username-bar">
    <label>Your Name:</label>
    <input type="text" id="username" placeholder="Enter your name" value="Investigator">
</div>

<div class="chat-box" id="chatBox">
    <p style="color:#666; text-align:center;">Loading messages...</p>
</div>

<div class="chat-input-area">
    <input type="text" id="msgInput" placeholder="Type your message..." autocomplete="off">
    <button onclick="sendMessage()">Send</button>
</div>

</div>

<script>
const chatBox = document.getElementById('chatBox');
const msgInput = document.getElementById('msgInput');
const usernameInput = document.getElementById('username');

// Send message on Enter key
msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendMessage();
});

function sendMessage() {
    const message = msgInput.value.trim();
    const username = usernameInput.value.trim() || 'Anonymous';
    if (!message) return;

    fetch('/chat/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, message: message })
    }).then(() => {
        msgInput.value = '';
        loadMessages();
    });
}

function loadMessages() {
    fetch('/chat/messages')
        .then(r => r.json())
        .then(messages => {
            if (messages.length === 0) {
                chatBox.innerHTML = '<p style="color:#666; text-align:center;">No messages yet. Start the conversation!</p>';
                return;
            }
            chatBox.innerHTML = messages.map(m =>
                '<div class="chat-msg">' +
                    '<span class="msg-user">' + escapeHtml(m.username) + '</span>' +
                    '<span class="msg-time">' + escapeHtml(m.timestamp) + '</span>' +
                    '<div class="msg-text">' + escapeHtml(m.message) + '</div>' +
                '</div>'
            ).join('');
            chatBox.scrollTop = chatBox.scrollHeight;
        });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Poll for new messages every 3 seconds
loadMessages();
setInterval(loadMessages, 3000);
</script>

</body>
</html>
