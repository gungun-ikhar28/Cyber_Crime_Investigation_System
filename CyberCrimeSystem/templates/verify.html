<!DOCTYPE html>
<html>

<head>

<title>Evidence Hash Verification</title>

<style>

body{
background:#020024;
background:linear-gradient(135deg,#020024,#090979,#00d4ff);
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:rgba(0,0,0,0.85);
padding:40px;
border-radius:15px;
text-align:center;
width:420px;
box-shadow:0 0 25px #00ffff;
}

h2{
color:#00ffff;
margin-bottom:25px;
}

.upload-area{

border:2px dashed #00ffff;
padding:40px;
border-radius:10px;
cursor:pointer;
transition:0.3s;

}

.upload-area:hover{
background:rgba(0,255,255,0.1);
}

input[type="file"]{
display:none;
}

button{

margin-top:20px;
padding:12px 25px;
background:#00ffff;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;

}

button:hover{
background:#00cccc;
}

</style>

</head>

<body>

<div class="box">

<h2>Evidence Hash Verification</h2>

<form action="/verify" method="POST" enctype="multipart/form-data">

<label class="upload-area">

📂 Click to Select Evidence File

<input type="file" name="file" required>

</label>

<br>

<button type="submit">Verify Evidence</button>

</form>

<a href="/dashboard" style="display:inline-block; margin-top:20px; color:#00ffff; text-decoration:none; font-size:14px;">&larr; Back to Dashboard</a>

</div>

</body>

</html>
