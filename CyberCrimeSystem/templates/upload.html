<!DOCTYPE html>
<html>
<head>
<title>Upload Evidence</title>

<style>

body{
font-family: Arial;
background: linear-gradient(to right,#1d2671,#c33764);
min-height:100vh;
display:flex;
flex-direction:column;
}

.container{
background:white;
padding:40px;
border-radius:10px;
width:400px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
margin-bottom:20px;
}

.file-input{
border:2px dashed #aaa;
padding:25px;
margin-bottom:20px;
border-radius:10px;
cursor:pointer;
}

.file-input:hover{
background:#f3f3f3;
}

input[type=file]{
border:none;
}

input[type=text]{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#1d2671;
color:white;
padding:12px;
width:100%;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0f1450;
}

.back-link{
display:inline-block;
margin-top:15px;
color:#1d2671;
text-decoration:none;
font-size:14px;
}

.back-link:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div style="flex:1; display:flex; justify-content:center; align-items:center;">
<div class="container">

<h2>Upload Digital Evidence</h2>

<form action="/upload" method="post" enctype="multipart/form-data">

<div class="file-input">
<p>Select Evidence File</p>
<input type="file" name="file" required>
</div>

<label>Enter Evidence Hash (SHA256)</label>
<input type="text" name="hash" placeholder="Enter Hash Value" required>

<button type="submit">Upload & Verify</button>

</form>

<a href="/dashboard" class="back-link">&larr; Back to Dashboard</a>

</div>
</div>

<footer style="text-align:center; padding:20px 15px; color:#fff; font-size:12px; border-top:1px solid rgba(255,255,255,0.3); background:rgba(0,0,0,0.3); letter-spacing:0.5px; width:100%;">
    <p style="margin:4px 0;">&copy; 2026 Cyber Crime Investigation System. All rights reserved.</p>
    <p style="margin:4px 0; color:#ffd700; font-size:13px;">Developed by Gungun I &amp; Ayushi I.</p>
</footer>

</body>
</html>
